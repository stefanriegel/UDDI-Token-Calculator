# GoReleaser OSS v2 — macOS ARM + Windows x64
version: 2

builds:
  - id: uddi-token-calculator
    env:
      - CGO_ENABLED=0
    targets:
      - darwin_arm64
      - windows_amd64
    ldflags:
      - -s -w
      - -X github.com/infoblox/uddi-go-token-calculator/internal/version.Version={{.Version}}
      - -X github.com/infoblox/uddi-go-token-calculator/internal/version.Commit={{.ShortCommit}}
    binary: uddi-token-calculator

archives:
  - id: default
    name_template: "uddi-token-calculator_{{ .Os }}_{{ .Arch }}"
    formats: [binary]

checksum:
  name_template: "checksums.txt"

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

snapshot:
  version_template: "{{ .Summary }}"

release:
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"
  make_latest: true

changelog:
  disable: true
