# GoReleaser OSS v2 — native cross-compilation
# GoReleaser handles cross-compilation natively for all targets.
version: 2

builds:
  - id: uddi-token-calculator
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/infoblox/uddi-go-token-calculator/internal/version.Version={{.Version}}
      - -X github.com/infoblox/uddi-go-token-calculator/internal/version.Commit={{.ShortCommit}}
    binary: uddi-token-calculator

archives:
  - id: default
    name_template: "uddi-token-calculator_{{ .Os }}_{{ .Arch }}"
    format: binary

checksum:
  name_template: "checksums.txt"

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

snapshot:
  version_template: "{{ .Summary }}"

release:
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"
  make_latest: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
