# GoReleaser OSS v2 — native cross-compilation
# GoReleaser handles cross-compilation natively for all targets.
version: 2

builds:
  - id: ddi-scanner
    env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/infoblox/uddi-go-token-calculator/internal/version.Version={{.Version}}
      - -X github.com/infoblox/uddi-go-token-calculator/internal/version.Commit={{.ShortCommit}}
    binary: ddi-scanner

archives:
  - id: default
    name_template: "ddi-scanner_{{ .Os }}_{{ .Arch }}"
    format: binary

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Summary }}"

release:
  prerelease: auto
  name_template: "{{.ProjectName}} {{.Tag}}"
  make_latest: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
