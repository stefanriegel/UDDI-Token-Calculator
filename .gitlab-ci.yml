# GitLab CI/CD for UDDI-Token-Calculator
# Go + embedded frontend (go:embed) → Docker → GitHub release

include:
  - project: 'stefanriegel/ci-templates'
    ref: main
    file: '/templates/base.yml'
  - project: 'stefanriegel/ci-templates'
    ref: main
    file: '/templates/docker.yml'
  - project: 'stefanriegel/ci-templates'
    ref: main
    file: '/templates/release.yml'

# Merge all stages from base + docker + release
stages:
  - .pre
  - lint
  - test
  - build
  - docker-build
  - release

# Go compile parallelism and GC tuning — large AWS/Azure/GCP SDKs
# cause OOM kills at default settings in memory-limited containers
variables:
  GOFLAGS: "-p=2"
  GOGC: "50"

# ── Frontend build (provides artifacts for Go embed) ──────────────────
build-frontend:
  stage: .pre
  image: node:22-alpine
  script:
    - cd frontend
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - pnpm install --frozen-lockfile
    - pnpm build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 hour
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/node_modules/

# ── Go lint ───────────────────────────────────────────────────────────
go-lint:
  stage: lint
  image: golang:1.25-alpine
  needs: ["build-frontend"]
  script:
    - go vet ./...
  rules:
    - if: '$SKIP_LINT == "true"'
      when: never
    - when: on_success
  cache:
    key:
      files:
        - go.sum
    paths:
      - /go/pkg/mod/

# ── Go test ───────────────────────────────────────────────────────────
go-test:
  stage: test
  image: golang:1.25-alpine
  needs: ["build-frontend"]
  script:
    - go test ./... -count=1
  rules:
    - if: '$SKIP_TEST == "true"'
      when: never
    - when: on_success
  cache:
    key:
      files:
        - go.sum
    paths:
      - /go/pkg/mod/

# ── Frontend tests ────────────────────────────────────────────────────
frontend-test:
  stage: test
  image: node:22-alpine
  needs: ["build-frontend"]
  script:
    - cd frontend
    - corepack enable
    - corepack prepare pnpm@latest --activate
    - pnpm install --frozen-lockfile
    - npx vitest run
  rules:
    - if: '$SKIP_TEST == "true"'
      when: never
    - when: on_success
  cache:
    key:
      files:
        - frontend/pnpm-lock.yaml
    paths:
      - frontend/node_modules/

# ── Go build (verify it compiles) ────────────────────────────────────
go-build:
  stage: build
  image: golang:1.25-alpine
  needs: ["build-frontend"]
  script:
    - CGO_ENABLED=0 go build -o /dev/null .
  rules:
    - if: '$SKIP_BUILD == "true"'
      when: never
    - when: on_success
  cache:
    key:
      files:
        - go.sum
    paths:
      - /go/pkg/mod/
