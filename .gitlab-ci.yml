# UDDI-Token-Calculator CI/CD configuration
# Uses shared Go, Docker, and release templates from ci-templates repo
#
# NOTE: This repo also defines a `build-frontend` job (React build for go:embed).
# The Go jobs below add needs: to wait for build-frontend artifacts before running.
# All other Go job config (image, script, cache) is inherited from templates/go.yml.

include:
  - project: 'stefanriegel/ci-templates'
    ref: main
    file: '/templates/go.yml'
  - project: 'stefanriegel/ci-templates'
    ref: main
    file: '/templates/docker.yml'
  - project: 'stefanriegel/ci-templates'
    ref: main
    file: '/templates/release.yml'

go-lint:
  needs: ["build-frontend"]

go-test:
  needs: ["build-frontend"]

go-build:
  needs: ["build-frontend", "go-test"]
