name: CI

on:
  push:
    branches: [main, dev]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, dev]

jobs:
  # Job 1: Run tests on every push and PR
  test:
    name: Test
    runs-on: [self-hosted, linux, x64, gsd-ubuntu]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Run Go tests
        run: go test ./... -race -count=1

      - name: Run Go vet
        run: go vet ./...

      - name: Run frontend tests
        working-directory: frontend
        run: npx vitest run

  # Job 2a: GoReleaser stable release — only on semver tags without -dev.
  release-stable:
    name: Release (Stable)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-dev.')
    runs-on: [self-hosted, linux, x64, gsd-ubuntu]
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Prepare release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES_FILE=".github/release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
          else
            echo "file=" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean ${{ steps.notes.outputs.file && format('--release-notes {0}', steps.notes.outputs.file) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

  # Job 2b: GoReleaser dev release — only on semver tags with -dev.
  release-dev:
    name: Release (Dev)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-dev.')
    runs-on: [self-hosted, linux, x64, gsd-ubuntu]
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Prepare release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES_FILE=".github/release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
          else
            echo "file=" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --config .goreleaser-dev.yaml ${{ steps.notes.outputs.file && format('--release-notes {0}', steps.notes.outputs.file) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

  # Job 3: Build and push Docker image to GHCR on every v*.*.* tag.
  docker-publish:
    name: Docker (GHCR)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, linux, x64, gsd-ubuntu]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/stefanriegel/uddi-token-calculator
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ !contains(github.ref, '-dev.') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          build-args: |
            VERSION=${{ github.ref_name }}
            COMMIT=${{ github.sha }}
            CHANNEL=${{ contains(github.ref, '-dev.') && 'dev' || 'stable' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
