name: CI

on:
  push:
    branches: [main, dev]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main, dev]

jobs:
  # Job 1: Run tests on every push and PR
  test:
    name: Test
    runs-on: [self-hosted, linux, x64, gsd-ubuntu]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Run Go tests
        run: go test ./... -race -count=1

      - name: Run Go vet
        run: go vet ./...

      - name: Run frontend tests
        working-directory: frontend
        run: npx vitest run

  # Job 2a: GoReleaser stable release — only on semver tags without -dev.
  release-stable:
    name: Release (Stable)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-dev.')
    runs-on: [self-hosted, linux, x64, gsd-ubuntu]
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Prepare release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES_FILE=".github/release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
          else
            echo "file=" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean ${{ steps.notes.outputs.file && format('--release-notes {0}', steps.notes.outputs.file) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

  # Job 2b: GoReleaser dev release — only on semver tags with -dev.
  release-dev:
    name: Release (Dev)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, '-dev.')
    runs-on: [self-hosted, linux, x64, gsd-ubuntu]
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile && pnpm build

      - name: Prepare release notes
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          NOTES_FILE=".github/release-notes/${TAG}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"
          else
            echo "file=" >> "$GITHUB_OUTPUT"
          fi

      - name: Import GPG key
        uses: crazy-max/ghaction-import-gpg@v7
        id: import_gpg
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}

      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean --config .goreleaser-dev.yaml ${{ steps.notes.outputs.file && format('--release-notes {0}', steps.notes.outputs.file) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}

  # Job 3: Build and push Docker image to GHCR on every v*.*.* tag.
  docker-publish:
    name: Docker (GHCR)
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: [self-hosted, linux, x64, gsd-ubuntu]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute image tags
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          IMAGE="ghcr.io/stefanriegel/uddi-token-calculator"
          TAGS="${IMAGE}:${VERSION}"
          if [[ "$GITHUB_REF_NAME" != *-dev.* ]]; then
            TAGS="${TAGS},${IMAGE}:latest"
          fi
          if [[ "$GITHUB_REF_NAME" == *-dev.* ]]; then
            CHANNEL="dev"
          else
            CHANNEL="stable"
          fi
          echo "tags=${TAGS}"       >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "channel=${CHANNEL}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | sudo docker login ghcr.io -u "${{ github.actor }}" --password-stdin

          IFS=',' read -ra TAG_ARRAY <<< "${{ steps.meta.outputs.tags }}"
          BUILD_TAGS=""
          for tag in "${TAG_ARRAY[@]}"; do
            BUILD_TAGS="${BUILD_TAGS} -t ${tag}"
          done

          sudo docker build \
            --build-arg VERSION="${{ github.ref_name }}" \
            --build-arg COMMIT="${{ github.sha }}" \
            --build-arg CHANNEL="${{ steps.meta.outputs.channel }}" \
            ${BUILD_TAGS} \
            .

          for tag in "${TAG_ARRAY[@]}"; do
            sudo docker push "$tag"
          done
          sudo docker logout ghcr.io
